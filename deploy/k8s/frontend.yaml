apiVersion: apps/v1
kind: Deployment
metadata:
  name: amps-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: amps-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amps-frontend
        app.kubernetes.io/part-of: amps
    spec:
      containers:
        - name: web
          image: ghcr.io/biniyognet/amps-frontend:demo   # retagged via kustomization.yaml `images:`
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: amps-frontend
spec:
  selector:
    app.kubernetes.io/name: amps-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
