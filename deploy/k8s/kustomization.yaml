apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: amps-demo

resources:
  - namespace.yaml
  - postgres.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml
  - seed-job.yaml
  # - secrets.yaml   # your filled-in copy of secrets.template.yaml (gitignored)

# Point at your registry / tag without editing the manifests:
images:
  - name: ghcr.io/biniyognet/amps-backend
    newTag: demo
  - name: ghcr.io/biniyognet/amps-frontend
    newTag: demo
