# TEMPLATE ONLY — never commit real credentials.
#
# Either:
#   a) copy to secrets.yaml (gitignored), fill in values, add it to
#      kustomization.yaml resources; or
#   b) create the secrets imperatively:
#
#   kubectl -n amps-demo create secret generic amps-db-credentials \
#     --from-literal=POSTGRES_DB=amps \
#     --from-literal=POSTGRES_USER=amps \
#     --from-literal=POSTGRES_PASSWORD='<strong-random-password>'
#
#   kubectl -n amps-demo create secret generic amps-backend-env \
#     --from-literal=DATABASE_URL='postgresql+psycopg2://amps:<strong-random-password>@amps-db:5432/amps'
#
apiVersion: v1
kind: Secret
metadata:
  name: amps-db-credentials
stringData:
  POSTGRES_DB: amps
  POSTGRES_USER: amps
  POSTGRES_PASSWORD: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: amps-backend-env
stringData:
  DATABASE_URL: postgresql+psycopg2://amps:CHANGE_ME@amps-db:5432/amps
