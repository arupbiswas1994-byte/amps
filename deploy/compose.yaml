# AMPS — one-command local/operational deployment (office laptop, workstation).
#
#   docker compose -f deploy/compose.yaml up -d --build
#   → http://localhost:8080  (UI; /api, /docs proxied same-origin)
#
# Data is REAL and persistent (Postgres volume). To load the synthetic demo
# dataset into an empty database:
#   docker compose -f deploy/compose.yaml run --rm backend python seed.py
#
# The k8s/ directory remains the public-demo hosting path; this file is the
# zero-cluster equivalent for a single machine.
name: amps

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: amps
      POSTGRES_USER: amps
      POSTGRES_PASSWORD: amps          # local single-machine default — change if exposed
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amps -d amps"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://amps:amps@db/amps
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        AMPS_DATA: ${AMPS_DATA:-demo}   # live = screens read the backend, no demo dataset
        AMPS_ORG: ${AMPS_ORG:-}         # organisation name on headers/tags/printouts
    volumes:
      - ./docker/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
