server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client-side routes resolve to index.html
    location / {
        try_files $uri /index.html;
    }

    # /api, /docs and /openapi.json are routed to the backend at the Ingress
    # layer (see deploy/k8s/ingress.yaml), keeping the app same-origin.
}
