# Compose variant of nginx.conf — no Ingress layer here, so nginx itself
# proxies the backend routes to keep the app same-origin.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location ~ ^/(api|docs|openapi.json|redoc) {
        client_max_body_size 32m;  # bulk CSV imports (register / logbook history)
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
